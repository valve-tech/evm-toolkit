name: CI

# Standard test + typecheck on every push and pull request. Runs once
# at the workspace root, walking every package via yarn workspaces
# foreach. Kept separate from release.yml so the publish workflow
# only runs on tags and stays narrowly scoped on permissions.
#
# Security note: this workflow runs only the repo's own scripts on
# the repo's own source. No untrusted user inputs (issue/PR titles,
# commit messages, head refs) are interpolated into `run:` commands,
# so the standard workflow-injection class doesn't apply.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # A published library is consumed across Node majors, so exercise
      # the runtime on each supported one. The version-INDEPENDENT gates
      # (lint, typecheck, verify:*, docs:check) run once — on the 22 leg —
      # rather than redundantly on all three.
      fail-fast: false
      matrix:
        node: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v5

      # Enable corepack BEFORE setup-node@v5 so the yarn 4 shim from
      # the project's `packageManager` field is on PATH by the time
      # setup-node inspects package.json. setup-node@v5's
      # package-manager detection invokes yarn directly during setup;
      # without corepack enabled first, it falls back to the runner's
      # global yarn 1 and errors out.
      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      # Build first so cross-package type declarations exist on disk
      # (e.g. wallet-adapter's tsc lookup of @valve-tech/viem-errors
      # resolves to its dist/*.d.ts via the workspace symlink). Build
      # is workspace-topological so deps build before dependents.
      - name: Build
        run: yarn build

      # The runtime check that actually varies by Node major runs on
      # every leg.
      - name: Test
        run: yarn test

      # Version-independent gates below run once, on the 22 leg only.
      - name: Lint
        if: matrix.node == '22'
        run: yarn lint

      - name: Typecheck
        if: matrix.node == '22'
        run: yarn typecheck

      - name: Typecheck examples
        if: matrix.node == '22'
        run: yarn typecheck:examples

      # Catches the v0.9.2 class of bug: a new package was added under
      # packages/ but release.yml never got a Publish step for it, so
      # the OIDC release workflow ran green and silently skipped it.
      - name: Verify release coverage
        if: matrix.node == '22'
        run: yarn verify:release-coverage

      # Catches the v0.11.0 -> v0.11.1 class of bug: a new field added
      # to a type that crosses a serialization boundary (TxTrackerStore,
      # tx-flight-react storage) without runtime defensive reads,
      # migration step, or optional declaration. The manifest in
      # scripts/persisted-types.manifest.json forces the maintainer
      # to acknowledge each field addition and consider safety.
      - name: Verify persisted-type manifest
        if: matrix.node == '22'
        run: yarn verify:persisted-types

      # Ensures docs/api/*.json (TypeDoc model artifacts ingested by
      # docs.valve.city) match the current source. Any change to a
      # package's exported surface or TSDoc comments must be paired
      # with a regenerated artifact — same "lessons-as-automation"
      # pattern as the persisted-type manifest above. Recover with
      # `yarn docs:build` locally + commit.
      - name: Verify docs are up to date
        if: matrix.node == '22'
        run: yarn docs:check

  # Browser + anvil-backed integration tests for @valve-tech/wallet-adapter
  # (5 of the 8 worked bridge examples). Runs in parallel with the
  # `test` job above. Required for the overall CI run to pass.
  #
  # External deps that this job installs:
  #   - foundry (anvil), via the foundry-rs/foundry-toolchain action
  #   - Playwright Chromium, cached on ~/.cache/ms-playwright
  #
  # Cold runs: ~3 min wall-clock (foundry install + Playwright
  # download dominate). Cached runs: ~30s wall-clock.
  integration:
    name: browser + integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      # Build so wallet-adapter has its dist/ (the example files
      # import from `../src/index.js` which TypeScript resolves
      # against the workspace's source-or-dist, but `yarn test:browser`
      # bundles everything through Vite — building first keeps the
      # shape consistent with how `yarn verify:clean` runs locally).
      - name: Build
        run: yarn build

      # Anvil is the local-chain backbone for `yarn test:integration`
      # (server-relayer + ethers bridges sign real txs against it)
      # and for `yarn test:browser`'s anvil-backed test files
      # (EIP-1193 + wagmi bridges talk to anvil over HTTP from
      # the browser context).
      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # Cache the Playwright browser binaries — ~100MB download
      # otherwise. Cache key uses the installed @playwright/test
      # version so a Playwright bump invalidates automatically.
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./node_modules/playwright/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # System libraries that Chromium needs at runtime — only
      # installed when the binary cache missed (the --with-deps flag
      # above handles this on a fresh install). For a cache hit we
      # still need the libs in case the runner image rotated.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run browser tests
        run: yarn test:browser

      - name: Run integration tests
        run: yarn test:integration
